name: Publish to TER (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g., v0.1.1)'
        required: true
        type: string

permissions: {}

jobs:
  publish:
    name: Upload to TER
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.4'
          extensions: intl, mbstring

      - name: Install tailor
        run: composer global require typo3/tailor --no-progress

      - name: Upload to TER
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${INPUT_TAG#v}"
          EXTENSION_KEY=$(composer config extra.typo3/cms.extension-key 2>/dev/null || echo "nr_passkeys_fe")
          ~/.composer/vendor/bin/tailor ter:publish "$VERSION" "$EXTENSION_KEY" --comment "Release ${INPUT_TAG}"
