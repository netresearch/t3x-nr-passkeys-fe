name: Publish to TER (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g., v0.1.1)'
        required: true
        type: string

permissions: {}

jobs:
  publish:
    name: Upload to TER
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag }}

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.4'
          extensions: intl, mbstring

      - name: Install tailor
        run: composer global require typo3/tailor --no-progress

      - name: Fetch release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          BODY=$(gh release view "$INPUT_TAG" --json body --jq '.body' 2>/dev/null || echo "Release ${INPUT_TAG}")
          {
            echo "comment<<COMMENT_EOF"
            echo "$BODY"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to TER
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
          COMMENT: ${{ steps.notes.outputs.comment }}
        run: |
          VERSION="${INPUT_TAG#v}"
          EXTENSION_KEY=$(composer config extra.typo3/cms.extension-key 2>/dev/null || echo "nr_passkeys_fe")
          ~/.composer/vendor/bin/tailor ter:publish "$VERSION" "$EXTENSION_KEY" --comment "$COMMENT"
