name: TER Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

permissions: {}

jobs:
  publish:
    name: Publish to TER
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TYPO3_EXTENSION_KEY: nr_passkeys_fe
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Determine version
        id: get-version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            if ! [[ "${INPUT_VERSION}" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
              echo "Invalid version format: ${INPUT_VERSION}"
              echo "Expected format: 0.1.0"
              exit 1
            fi
            echo "version=${INPUT_VERSION}" >> "$GITHUB_ENV"
            echo "checkout_ref=${INPUT_VERSION}" >> "$GITHUB_ENV"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "checkout_ref=${TAG}" >> "$GITHUB_ENV"
            echo "version=${TAG#v}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.checkout_ref }}

      - name: Validate ext_emconf.php version
        env:
          TAG_VERSION: ${{ env.version }}
        run: |
          EMCONF_VERSION=$(sed -nE "s/.*'version'[[:space:]]*=>[[:space:]]*'([^']+)'.*/\1/p" ext_emconf.php)
          if [[ -z "${EMCONF_VERSION}" ]]; then
            echo "::error file=ext_emconf.php::Could not extract version from ext_emconf.php"
            exit 1
          fi
          if [[ "${TAG_VERSION}" != "${EMCONF_VERSION}" ]]; then
            echo "::error file=ext_emconf.php::Tag version (${TAG_VERSION}) does not match ext_emconf.php version (${EMCONF_VERSION}). Update ext_emconf.php before tagging."
            exit 1
          fi
          echo "Version validated: ${TAG_VERSION} matches ext_emconf.php"

      - name: Prepare release comment
        env:
          TAG_VERSION: ${{ env.version }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          if [[ -n "${RELEASE_BODY}" ]]; then
            COMMENT=$(echo "${RELEASE_BODY}" | sed 's/[#*+=~^|\\<>]//g' | head -c 1000)
          elif [[ -n "${RELEASE_NAME}" ]]; then
            COMMENT="${RELEASE_NAME}"
          else
            COMMENT="Released version ${TAG_VERSION} of nr_passkeys_fe"
          fi

          if [[ -z "${COMMENT// }" ]]; then
            COMMENT="Released version ${TAG_VERSION} of nr_passkeys_fe"
          fi

          if [[ -n "${RELEASE_URL}" ]]; then
            COMMENT=$(printf '%s\n\nDetails: %s' "${COMMENT}" "${RELEASE_URL}")
          fi

          {
            echo "comment<<EOF"
            echo "${COMMENT}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.3'
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor --prefer-dist --no-progress

      - name: Upload to TER
        env:
          RELEASE_COMMENT: ${{ env.comment }}
          RELEASE_VERSION: ${{ env.version }}
        run: |
          php ~/.composer/vendor/bin/tailor ter:publish --comment "${RELEASE_COMMENT}" "${RELEASE_VERSION}"
