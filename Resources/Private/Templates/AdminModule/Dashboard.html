<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <h1><f:translate key="dashboard.title" extensionName="NrPasskeysFe" /></h1>
    <p class="text-body-secondary mb-4">
        <f:translate key="dashboard.description" extensionName="NrPasskeysFe">Overview of passkey adoption across frontend user groups.</f:translate>
    </p>

    <div id="passkey-fe-dashboard">
        <!-- Adoption Statistics Cards -->
        <div class="card-container mb-4" role="group" aria-label="{f:translate(key: 'dashboard.adoption.title', extensionName: 'NrPasskeysFe')}">
            <div class="card card-size-fixed-small">
                <div class="card-header">
                    <div class="card-header-body">
                        <span class="card-title" aria-label="{totalUsers} {f:translate(key: 'dashboard.totalUsers', extensionName: 'NrPasskeysFe')}">{totalUsers}</span>
                        <span class="card-subtitle"><f:translate key="dashboard.totalUsers" extensionName="NrPasskeysFe" /></span>
                    </div>
                </div>
            </div>
            <div class="card card-size-fixed-small">
                <div class="card-header">
                    <div class="card-header-body">
                        <span class="card-title text-success" aria-label="{usersWithPasskeys} {f:translate(key: 'dashboard.usersWithPasskeys', extensionName: 'NrPasskeysFe')}">{usersWithPasskeys}</span>
                        <span class="card-subtitle"><f:translate key="dashboard.usersWithPasskeys" extensionName="NrPasskeysFe" /></span>
                    </div>
                </div>
            </div>
            <div class="card card-size-fixed-small">
                <div class="card-header">
                    <div class="card-header-body">
                        <span class="card-title" aria-label="{adoptionPercentage -> f:format.number(decimals: 1)}% {f:translate(key: 'dashboard.adoptionRate', extensionName: 'NrPasskeysFe')}">
                            <f:format.number decimals="1">{adoptionPercentage}</f:format.number>%
                        </span>
                        <span class="card-subtitle"><f:translate key="dashboard.adoptionRate" extensionName="NrPasskeysFe" /></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Frontend User Group Enforcement Table -->
        <f:if condition="{groups}">
            <f:then>
                <h2><f:translate key="dashboard.groups.title" extensionName="NrPasskeysFe" /></h2>
                <div class="table-fit mb-4">
                    <table class="table table-striped table-hover" id="passkey-fe-groups-table">
                        <thead>
                            <tr>
                                <th scope="col"><f:translate key="dashboard.groups.group" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.groups.enforcement" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.groups.users" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.groups.withPasskeys" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.groups.adoption" extensionName="NrPasskeysFe" /></th>
                            </tr>
                        </thead>
                        <tbody>
                            <f:for each="{groups}" as="group">
                                <tr>
                                    <td>{group.title -> f:format.htmlspecialchars()}</td>
                                    <td>
                                        <select class="form-select form-select-sm passkey-fe-enforcement-select"
                                                data-group-uid="{group.uid}"
                                                data-original-value="{group.enforcement}">
                                            <f:for each="{enforcementLevels}" as="label" key="value">
                                                <f:if condition="{value} == {group.enforcement}">
                                                    <f:then><option value="{value}" selected="selected">{label}</option></f:then>
                                                    <f:else><option value="{value}">{label}</option></f:else>
                                                </f:if>
                                            </f:for>
                                        </select>
                                    </td>
                                    <td>{group.totalUsers}</td>
                                    <td>{group.usersWithPasskeys}</td>
                                    <td>
                                        <f:if condition="{group.totalUsers} > 0">
                                            <f:then>
                                                <div class="progress" style="min-width: 60px;">
                                                    <div class="progress-bar bg-success"
                                                         role="progressbar"
                                                         aria-valuenow="{group.adoptionPercentage}"
                                                         aria-valuemin="0"
                                                         aria-valuemax="100"
                                                         style="width: {group.adoptionPercentage}%;">
                                                        <f:format.number decimals="0">{group.adoptionPercentage}</f:format.number>%
                                                    </div>
                                                </div>
                                            </f:then>
                                            <f:else><span class="text-body-secondary">-</span></f:else>
                                        </f:if>
                                    </td>
                                </tr>
                            </f:for>
                        </tbody>
                    </table>
                </div>
            </f:then>
            <f:else>
                <f:be.infobox title="{f:translate(key: 'dashboard.allAdopted.title', extensionName: 'NrPasskeysFe')}" state="{f:constant(name: 'TYPO3\CMS\Core\Type\ContextualFeedbackSeverity::OK')}">
                    <f:translate key="dashboard.allAdopted.body" extensionName="NrPasskeysFe">All active frontend users have registered passkeys.</f:translate>
                </f:be.infobox>
            </f:else>
        </f:if>

        <!-- FE User Passkey Lookup -->
        <div class="card mb-4" id="passkey-fe-user-lookup">
            <div class="card-header">
                <h2 class="card-title mb-0"><f:translate key="dashboard.lookup.title" extensionName="NrPasskeysFe" /></h2>
            </div>
            <div class="card-body">
                <div class="row g-2 align-items-end mb-3">
                    <div class="col-auto">
                        <label for="passkey-fe-user-uid-input" class="form-label">
                            <f:translate key="dashboard.lookup.uid_label" extensionName="NrPasskeysFe" />
                        </label>
                        <input type="number"
                               id="passkey-fe-user-uid-input"
                               class="form-control form-control-sm"
                               placeholder="{f:translate(key: 'dashboard.lookup.placeholder', extensionName: 'NrPasskeysFe')}"
                               min="1"
                               style="width: 120px;" />
                    </div>
                    <div class="col-auto">
                        <button type="button"
                                id="passkey-fe-load-user"
                                class="btn btn-default btn-sm">
                            <core:icon identifier="actions-search" size="small" />
                            <f:translate key="dashboard.lookup.load_button" extensionName="NrPasskeysFe" />
                        </button>
                    </div>
                </div>

                <!-- Results container (populated by JS) -->
                <div id="passkey-fe-user-credentials" class="d-none">
                    <table class="table table-sm table-striped" id="passkey-fe-credentials-table">
                        <thead>
                            <tr>
                                <th scope="col"><f:translate key="dashboard.lookup.column.label" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.lookup.column.site" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.lookup.column.created" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.lookup.column.last_used" extensionName="NrPasskeysFe" /></th>
                                <th scope="col"><f:translate key="dashboard.lookup.column.status" extensionName="NrPasskeysFe" /></th>
                                <th scope="col" class="col-control"><span class="visually-hidden"><f:translate key="dashboard.lookup.column.actions" extensionName="NrPasskeysFe" /></span></th>
                            </tr>
                        </thead>
                        <tbody id="passkey-fe-credentials-body"></tbody>
                    </table>
                    <div class="btn-group mt-2" role="group">
                        <button type="button"
                                id="passkey-fe-revoke-all"
                                class="btn btn-danger btn-sm"
                                title="{f:translate(key: 'dashboard.lookup.revoke_all_tooltip', extensionName: 'NrPasskeysFe')}">
                            <core:icon identifier="actions-ban" size="small" />
                            <f:translate key="dashboard.lookup.revoke_all" extensionName="NrPasskeysFe" />
                        </button>
                        <button type="button"
                                id="passkey-fe-unlock-user"
                                class="btn btn-default btn-sm"
                                title="{f:translate(key: 'dashboard.lookup.unlock_user_tooltip', extensionName: 'NrPasskeysFe')}">
                            <core:icon identifier="actions-unlock" size="small" />
                            <f:translate key="dashboard.lookup.unlock_user" extensionName="NrPasskeysFe" />
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</f:section>
</html>
