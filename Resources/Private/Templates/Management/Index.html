<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="Content">
<f:asset.css identifier="nr-passkeys-fe-css" href="EXT:nr_passkeys_fe/Resources/Public/Css/passkey-fe.css" />
<f:asset.script identifier="nr-passkeys-fe-utils" priority="true" src="EXT:nr_passkeys_fe/Resources/Public/JavaScript/PasskeyUtils.js" />
<f:asset.script identifier="nr-passkeys-fe-management" src="EXT:nr_passkeys_fe/Resources/Public/JavaScript/PasskeyManagement.js" />
<f:asset.script identifier="nr-passkeys-fe-enrollment" src="EXT:nr_passkeys_fe/Resources/Public/JavaScript/PasskeyEnrollment.js" />
<f:asset.script identifier="nr-passkeys-fe-recovery-codes" src="EXT:nr_passkeys_fe/Resources/Public/JavaScript/PasskeyRecoveryCodes.js" />
<div class="nr-passkeys-fe-management{f:if(condition: settings.cssClass, then: ' {settings.cssClass}')}"
     id="nr-passkeys-fe-management"
     data-nr-passkeys-fe="management"
     data-eid-url="{eidUrl}"
     data-list-url="{listUrl}"
     data-register-options-url="{registerOptionsUrl}"
     data-register-verify-url="{registerVerifyUrl}"
     data-rename-url="{renameUrl}"
     data-remove-url="{removeUrl}"
     data-recovery-generate-url="{recoveryGenerateUrl}">

    <section class="nr-passkeys-fe-management__passkeys">
        <h2 class="nr-passkeys-fe-management__section-title">
            <f:translate key="management.passkeys.title" extensionName="nr_passkeys_fe" />
        </h2>

        <p class="nr-passkeys-fe-management__description">
            <f:translate key="management.passkeys.description" extensionName="nr_passkeys_fe" />
        </p>

        <div class="nr-passkeys-fe-management__status" role="status" aria-live="polite" aria-atomic="true" style="display:none"></div>
        <div class="nr-passkeys-fe-management__error" role="alert" style="display:none"></div>

        <f:if condition="{credentials -> f:count()} == 1">
            <div class="nr-passkeys-fe-management__warning" role="alert">
                <f:translate key="management.warning.singleKey" extensionName="nr_passkeys_fe" />
            </div>
        </f:if>

        <table class="nr-passkeys-fe-management__table" id="nr-passkeys-fe-credential-list"
               {f:if(condition: credentials, else: 'style="display:none"')}>
            <thead>
                <tr>
                    <th scope="col" class="nr-passkeys-fe-management__th">
                        <f:translate key="management.column.label" extensionName="nr_passkeys_fe" />
                    </th>
                    <th scope="col" class="nr-passkeys-fe-management__th">
                        <f:translate key="management.column.created" extensionName="nr_passkeys_fe" />
                    </th>
                    <th scope="col" class="nr-passkeys-fe-management__th">
                        <f:translate key="management.column.lastUsed" extensionName="nr_passkeys_fe" />
                    </th>
                    <th scope="col" class="nr-passkeys-fe-management__th nr-passkeys-fe-management__th--actions">
                        <f:translate key="management.column.actions" extensionName="nr_passkeys_fe" />
                    </th>
                </tr>
            </thead>
            <tbody id="nr-passkeys-fe-credential-body">
                <f:for each="{credentials}" as="credential">
                    <tr class="nr-passkeys-fe-management__row" data-uid="{credential.uid}">
                        <td class="nr-passkeys-fe-management__td">
                            <span class="nr-passkeys-fe-management__label"
                                  data-uid="{credential.uid}">
                                {credential.label -> f:format.htmlspecialchars()}
                            </span>
                        </td>
                        <td class="nr-passkeys-fe-management__td">
                            <f:if condition="{credential.createdAt}">
                                <f:then>
                                    <time datetime="{credential.createdAt -> f:format.date(format: 'c')}">
                                        {credential.createdAt -> f:format.date(format: 'Y-m-d H:i')}
                                    </time>
                                </f:then>
                                <f:else>—</f:else>
                            </f:if>
                        </td>
                        <td class="nr-passkeys-fe-management__td">
                            <f:if condition="{credential.lastUsedAt}">
                                <f:then>
                                    <time datetime="{credential.lastUsedAt -> f:format.date(format: 'c')}">
                                        {credential.lastUsedAt -> f:format.date(format: 'Y-m-d H:i')}
                                    </time>
                                </f:then>
                                <f:else>
                                    <f:translate key="management.lastUsed.never" extensionName="nr_passkeys_fe" />
                                </f:else>
                            </f:if>
                        </td>
                        <td class="nr-passkeys-fe-management__td nr-passkeys-fe-management__td--actions">
                            <button type="button"
                                    class="nr-passkeys-fe-btn nr-passkeys-fe-btn--secondary nr-passkeys-fe-btn--sm"
                                    data-action="rename-credential"
                                    data-uid="{credential.uid}">
                                <f:translate key="management.action.rename" extensionName="nr_passkeys_fe" />
                            </button>
                            <button type="button"
                                    class="nr-passkeys-fe-btn nr-passkeys-fe-btn--danger nr-passkeys-fe-btn--sm"
                                    data-action="remove-credential"
                                    data-uid="{credential.uid}"
                                    data-label="{credential.label -> f:format.htmlspecialchars()}">
                                <f:translate key="management.action.remove" extensionName="nr_passkeys_fe" />
                            </button>
                        </td>
                    </tr>
                </f:for>
            </tbody>
        </table>

        <p class="nr-passkeys-fe-management__empty" id="nr-passkeys-fe-empty"
           {f:if(condition: credentials, then: 'style="display:none"')}>
            <f:translate key="management.passkeys.empty" extensionName="nr_passkeys_fe" />
        </p>

        <div class="nr-passkeys-fe-management__register"
             data-nr-passkeys-fe="enrollment-form"
             data-eid-url="{eidUrl}"
             data-register-options-url="{registerOptionsUrl}"
             data-register-verify-url="{registerVerifyUrl}">
            <h3 class="nr-passkeys-fe-management__subtitle">
                <f:translate key="management.register.title" extensionName="nr_passkeys_fe" />
            </h3>
            <div class="nr-passkeys-fe-management__register-form">
                <label class="nr-passkeys-fe-management__label-text"
                       for="nr-passkeys-fe-new-label">
                    <f:translate key="management.register.label" extensionName="nr_passkeys_fe" />
                </label>
                <input type="text"
                       id="nr-passkeys-fe-new-label"
                       class="nr-passkeys-fe-management__input"
                       placeholder="{f:translate(key: 'management.register.placeholder', extensionName: 'nr_passkeys_fe')}"
                       maxlength="128"
                       value="Passkey" />
                <button type="button"
                        id="nr-passkeys-fe-register-btn"
                        class="nr-passkeys-fe-btn nr-passkeys-fe-btn--primary"
                        data-action="register-passkey">
                    <span class="nr-passkeys-fe-btn__text">
                        <f:translate key="management.register.button" extensionName="nr_passkeys_fe" />
                    </span>
                    <span class="nr-passkeys-fe-btn__loading" style="display:none" aria-hidden="true">
                        <f:translate key="management.register.registering" extensionName="nr_passkeys_fe" />
                    </span>
                </button>
            </div>
        </div>
    </section>

    <section class="nr-passkeys-fe-management__recovery"
             data-nr-passkeys-fe="recovery-codes"
             data-eid-url="{eidUrl}"
             data-generate-url="{recoveryGenerateUrl}">
        <h2 class="nr-passkeys-fe-management__section-title">
            <f:translate key="management.recovery.title" extensionName="nr_passkeys_fe" />
        </h2>

        <p class="nr-passkeys-fe-management__recovery-description">
            <f:translate key="management.recovery.description" extensionName="nr_passkeys_fe" />
        </p>

        <div class="nr-passkeys-fe-management__recovery-count">
            <f:translate key="management.recovery.remaining" extensionName="nr_passkeys_fe" />:
            <strong id="nr-passkeys-fe-recovery-count">{recoveryCodesRemaining}</strong>
        </div>

        <div id="nr-passkeys-fe-codes-grid" class="nr-passkeys-fe-recovery-codes__grid" style="display:none"></div>
        <div class="nr-passkeys-fe-recovery-codes__status" role="status" aria-live="polite" style="display:none"></div>
        <div class="nr-passkeys-fe-recovery-codes__error" role="alert" style="display:none"></div>

        <div class="nr-passkeys-fe-management__recovery-actions">
            <button type="button"
                    class="nr-passkeys-fe-btn nr-passkeys-fe-btn--secondary"
                    data-action="generate-codes">
                <span class="nr-passkeys-fe-btn__text">
                    <f:translate key="management.recovery.manage" extensionName="nr_passkeys_fe" />
                </span>
                <span class="nr-passkeys-fe-btn__loading" style="display:none" aria-hidden="true">
                    <f:translate key="management.recovery.codes.generate.generating" extensionName="nr_passkeys_fe" />
                </span>
            </button>
            <button type="button"
                    class="nr-passkeys-fe-btn nr-passkeys-fe-btn--secondary"
                    data-action="download-codes"
                    data-filename="passkey-recovery-codes.txt"
                    style="display:none">
                <f:translate key="management.recovery.codes.download" extensionName="nr_passkeys_fe" />
            </button>
        </div>
    </section>
</div>
</f:section>
</html>
