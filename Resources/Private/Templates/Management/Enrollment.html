<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="Content">
<div class="nr-passkeys-fe-enrollment-form{f:if(condition: settings.cssClass, then: ' {settings.cssClass}')}"
     data-nr-passkeys-fe="enrollment-form"
     data-eid-url="{eidUrl}"
     data-register-options-url="{registerOptionsUrl}"
     data-register-verify-url="{registerVerifyUrl}">

    <h2 class="nr-passkeys-fe-enrollment-form__title">
        <f:translate key="management.enrollment.title" extensionName="nr_passkeys_fe" />
    </h2>

    <div class="nr-passkeys-fe-enrollment-form__status" role="status" aria-live="polite" aria-atomic="true" style="display:none"></div>
    <div class="nr-passkeys-fe-enrollment-form__error" role="alert" style="display:none"></div>
    <div class="nr-passkeys-fe-enrollment-form__success" role="status" style="display:none">
        <f:translate key="management.enrollment.success" extensionName="nr_passkeys_fe" />
    </div>

    <div class="nr-passkeys-fe-enrollment-form__field">
        <label class="nr-passkeys-fe-enrollment-form__label"
               for="nr-passkeys-fe-enrollment-label">
            <f:translate key="management.enrollment.label" extensionName="nr_passkeys_fe" />
        </label>
        <input type="text"
               id="nr-passkeys-fe-enrollment-label"
               class="nr-passkeys-fe-enrollment-form__input"
               placeholder="{f:translate(key: 'management.enrollment.placeholder', extensionName: 'nr_passkeys_fe')}"
               maxlength="128"
               value="Passkey" />
    </div>

    <div class="nr-passkeys-fe-enrollment-form__actions">
        <button type="button"
                id="nr-passkeys-fe-enrollment-register-btn"
                class="nr-passkeys-fe-btn nr-passkeys-fe-btn--primary"
                data-action="register-passkey">
            <span class="nr-passkeys-fe-btn__text">
                <f:translate key="management.enrollment.register" extensionName="nr_passkeys_fe" />
            </span>
            <span class="nr-passkeys-fe-btn__loading" style="display:none" aria-hidden="true">
                <f:translate key="management.enrollment.registering" extensionName="nr_passkeys_fe" />
            </span>
        </button>
    </div>
</div>
</f:section>
</html>
