<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="Content">
<div class="nr-passkeys-fe-recovery"
     data-nr-passkeys-fe="recovery"
     data-eid-url="{eidUrl}">

    <h2 class="nr-passkeys-fe-recovery__title">
        <f:translate key="recovery.title" extensionName="nr_passkeys_fe" />
    </h2>

    <p class="nr-passkeys-fe-recovery__description">
        <f:translate key="recovery.description" extensionName="nr_passkeys_fe" />
    </p>

    <f:if condition="{errorMessage}">
        <div class="nr-passkeys-fe-recovery__error" role="alert">
            {errorMessage}
        </div>
    </f:if>

    <div class="nr-passkeys-fe-recovery__status" role="status" aria-live="polite" aria-atomic="true" style="display:none"></div>

    <form class="nr-passkeys-fe-recovery__form"
          action="{recoveryVerifyUrl}"
          method="post"
          novalidate
          data-action="recovery-verify">
        <f:form.hidden name="__hmac" value="{hmac}" />

        <div class="nr-passkeys-fe-recovery__field">
            <label class="nr-passkeys-fe-recovery__label" for="nr-passkeys-recovery-code">
                <f:translate key="recovery.code.label" extensionName="nr_passkeys_fe" />
            </label>
            <input type="text"
                   id="nr-passkeys-recovery-code"
                   name="nr_passkeys_recovery_code"
                   class="nr-passkeys-fe-recovery__input"
                   autocomplete="one-time-code"
                   inputmode="text"
                   pattern="[A-Za-z0-9]{4}-[A-Za-z0-9]{4}"
                   placeholder="XXXX-XXXX"
                   maxlength="9"
                   required
                   data-action="recovery-format" />
            <span class="nr-passkeys-fe-recovery__hint">
                <f:translate key="recovery.code.hint" extensionName="nr_passkeys_fe" />
            </span>
        </div>

        <div class="nr-passkeys-fe-recovery__actions">
            <button type="submit"
                    class="nr-passkeys-fe-recovery__submit nr-passkeys-fe-btn nr-passkeys-fe-btn--primary"
                    data-action="recovery-submit">
                <span class="nr-passkeys-fe-btn__text">
                    <f:translate key="recovery.button.verify" extensionName="nr_passkeys_fe" />
                </span>
                <span class="nr-passkeys-fe-btn__loading" style="display:none" aria-hidden="true">
                    <f:translate key="recovery.button.verifying" extensionName="nr_passkeys_fe" />
                </span>
            </button>
        </div>
    </form>

    <nav class="nr-passkeys-fe-recovery__links" aria-label="Recovery options">
        <a class="nr-passkeys-fe-recovery__link"
           href="{loginUrl}">
            <f:translate key="recovery.link.backToLogin" extensionName="nr_passkeys_fe" />
        </a>
    </nav>
</div>
</f:section>
</html>
