<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="Content">
<f:asset.css identifier="nr-passkeys-fe-css" href="EXT:nr_passkeys_fe/Resources/Public/Css/passkey-fe.css" />
<f:asset.script identifier="nr-passkeys-fe-login" src="EXT:nr_passkeys_fe/Resources/Public/JavaScript/PasskeyLogin.js" type="module" />
<f:asset.script identifier="nr-passkeys-fe-recovery" src="EXT:nr_passkeys_fe/Resources/Public/JavaScript/PasskeyRecovery.js" type="module" />
<div class="nr-passkeys-fe-login{f:if(condition: settings.cssClass, then: ' {settings.cssClass}')}"
     data-nr-passkeys-fe="login"
     data-eid-url="{eidUrl}"
     data-site-identifier="{siteIdentifier}"
     data-discoverable="{f:if(condition: settings.discoverableEnabled, then: '1', else: '0')}">

    <div class="nr-passkeys-fe-login__error" role="alert" aria-live="polite" style="{f:if(condition: errorMessage, else: 'display:none')}">
        {errorMessage}
    </div>

    <div class="nr-passkeys-fe-login__status" role="status" aria-live="polite" aria-atomic="true" style="display:none"></div>

    <f:if condition="{showUsernameField}">
        <div class="nr-passkeys-fe-login__field">
            <label class="nr-passkeys-fe-login__label" for="nr-passkeys-username">
                <f:translate key="login.username.label" extensionName="nr_passkeys_fe" />
            </label>
            <input type="text"
                   id="nr-passkeys-username"
                   name="nr_passkeys_username"
                   class="nr-passkeys-fe-login__input"
                   autocomplete="username webauthn"
                   autocorrect="off"
                   autocapitalize="none"
                   spellcheck="false"
                   value="{prefillUsername -> f:format.htmlspecialchars()}" />
        </div>
    </f:if>

    <div class="nr-passkeys-fe-login__actions">
        <f:render partial="Login/PasskeyButton" arguments="{_all}" />
    </div>

    <nav class="nr-passkeys-fe-login__links" aria-label="Authentication options">
        <f:if condition="{settings.showPasswordFallback}">
            <a class="nr-passkeys-fe-login__link nr-passkeys-fe-login__link--password"
               href="{passwordFallbackUrl}">
                <f:translate key="login.link.usePassword" extensionName="nr_passkeys_fe" />
            </a>
        </f:if>
        <a class="nr-passkeys-fe-login__link nr-passkeys-fe-login__link--recovery"
           href="{recoveryUrl}"
           data-action="show-recovery">
            <f:translate key="login.link.useRecoveryCode" extensionName="nr_passkeys_fe" />
        </a>
    </nav>
</div>

<div id="nr-passkeys-fe-recovery"
     class="nr-passkeys-fe-recovery"
     data-nr-passkeys-fe="recovery"
     data-eid-url="{eidUrl}"
     data-site-identifier="{siteIdentifier}"
     style="display:none">

    <h3 class="nr-passkeys-fe-recovery__title">
        <f:translate key="recovery.title" extensionName="nr_passkeys_fe" />
    </h3>

    <div class="nr-passkeys-fe-recovery__error" role="alert" style="display:none"></div>
    <div class="nr-passkeys-fe-recovery__status" role="status" style="display:none"></div>

    <div class="nr-passkeys-fe-recovery__field">
        <label class="nr-passkeys-fe-recovery__label" for="nr-passkeys-fe-recovery-code">
            <f:translate key="recovery.code.label" extensionName="nr_passkeys_fe" />
        </label>
        <input type="text"
               id="nr-passkeys-fe-recovery-code"
               name="recovery_code"
               class="nr-passkeys-fe-recovery__input"
               placeholder="XXXX-XXXX"
               maxlength="9"
               autocomplete="off"
               autocorrect="off"
               spellcheck="false" />
    </div>

    <div class="nr-passkeys-fe-recovery__field">
        <label class="nr-passkeys-fe-recovery__label" for="nr-passkeys-fe-recovery-username">
            <f:translate key="login.username.label" extensionName="nr_passkeys_fe" />
        </label>
        <input type="text"
               id="nr-passkeys-fe-recovery-username"
               name="recovery_username"
               class="nr-passkeys-fe-recovery__input"
               autocomplete="username" />
    </div>

    <button type="button"
            class="nr-passkeys-fe-btn nr-passkeys-fe-btn--primary"
            data-action="verify-recovery">
        <f:translate key="recovery.verify.button" extensionName="nr_passkeys_fe" />
    </button>

    <a class="nr-passkeys-fe-recovery__back" href="#" data-action="hide-recovery">
        <f:translate key="recovery.back.link" extensionName="nr_passkeys_fe" />
    </a>
</div>
</f:section>
</html>
